<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: transparent;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }

      .pill {
        display: flex;
        align-items: center;
        gap: 14px;
        height: 42px;
        padding: 0 10px 0 18px;
        background: #F4D9C9;
        border-radius: 999px;
        box-shadow: 0 6px 18px rgba(120, 60, 30, 0.18);
        color: #B85A3A;
        transition: opacity 0.18s ease, transform 0.18s ease;
        font-weight: 600;
      }
      .pill[data-state="ready"] { opacity: 0; transform: translateY(-6px); pointer-events: none; }
      .pill[data-state="recording"] { opacity: 1; transform: translateY(0); }
      .pill[data-state="transcribing"] { opacity: 1; transform: translateY(0); background: #F0E5CC; color: #8C6B2F; }

      .label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .mic-glyph {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
      }

      svg.matrix { display: block; }

      .stop-btn {
        margin-left: 4px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 7px;
        background: transparent;
        border: none;
        color: currentColor;
        cursor: pointer;
        flex-shrink: 0;
        transition: background 0.15s;
      }
      .stop-btn:hover { background: rgba(184, 90, 58, 0.12); }
      .stop-btn svg { width: 11px; height: 11px; }
      .pill[data-state="transcribing"] .stop-btn { opacity: 0.4; pointer-events: none; }
    </style>
  </head>
  <body>
    <div class="pill" id="pill" data-state="ready" data-tauri-drag-region>
      <span class="label" id="label">Listening...</span>
      <span class="mic-glyph">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <rect x="4.5" y="1" width="5" height="8.5" rx="2.5" stroke="currentColor" stroke-width="1.4"/>
          <path d="M2 8a5 5 0 0010 0M7 13.5v1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </span>
      <svg class="matrix" id="matrix" width="120" height="22" viewBox="0 0 120 22"></svg>
      <button type="button" class="stop-btn" id="stop-btn" aria-label="Stop recording">
        <svg viewBox="0 0 11 11"><rect x="0.5" y="0.5" width="10" height="10" rx="1.5" fill="currentColor"/></svg>
      </button>
    </div>

    <script>
      const COLS = 18;
      const ROWS = 7;
      const CELL = 6;
      const DOT_R = 1.6;

      const pill = document.getElementById('pill');
      const label = document.getElementById('label');
      const stopBtn = document.getElementById('stop-btn');
      const matrix = document.getElementById('matrix');

      // Pre-create circles in a grid. Each column has ROWS circles vertically centered.
      // Top and bottom rows mirror around the middle so amplitude grows symmetrically.
      const dots = []; // dots[col][row] = element
      const startX = 4;
      const middleY = 11; // half of viewBox height
      for (let c = 0; c < COLS; c++) {
        const colDots = [];
        for (let r = 0; r < ROWS; r++) {
          const offset = r - Math.floor(ROWS / 2);
          const cy = middleY + offset * CELL * 0.55;
          const cx = startX + c * CELL;
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', cx);
          dot.setAttribute('cy', cy);
          dot.setAttribute('r', DOT_R);
          dot.setAttribute('fill', 'currentColor');
          dot.setAttribute('opacity', '0.18');
          matrix.appendChild(dot);
          colDots.push(dot);
        }
        dots.push(colDots);
      }

      // Rolling buffer of recent levels, oldest at index 0, newest at last.
      let levels = new Array(COLS).fill(0);

      const setColumn = (col, level) => {
        // level: 0..1. Determine how many rows around center to light up.
        // ROWS=7, center=3, so radius can be 0..3.
        const center = Math.floor(ROWS / 2);
        const radius = Math.min(center, Math.round(level * center));
        for (let r = 0; r < ROWS; r++) {
          const distance = Math.abs(r - center);
          const lit = distance <= radius;
          const opacity = lit ? Math.max(0.55, 1 - distance * 0.18) : 0.18;
          dots[col][r].setAttribute('opacity', opacity.toFixed(2));
        }
      };

      const renderAll = () => {
        for (let c = 0; c < COLS; c++) setColumn(c, levels[c]);
      };

      // Smoothing so bars don't strobe.
      let smoothed = 0;

      const pushLevel = (raw) => {
        // RMS values from cpal are typically 0.001..0.3 for quiet/loud speech.
        // Map with a non-linear curve so quiet speech is visible.
        const normalized = Math.min(1, Math.pow(Math.min(raw * 6, 1), 0.6));
        smoothed = smoothed * 0.4 + normalized * 0.6;
        levels.shift();
        levels.push(smoothed);
        renderAll();
      };

      const setState = (state) => {
        const map = { Ready: 'ready', Recording: 'recording', Transcribing: 'transcribing' };
        const s = map[state] || 'ready';
        pill.dataset.state = s;
        if (s === 'recording') label.textContent = 'Listening...';
        else if (s === 'transcribing') label.textContent = 'Transcribing...';
        if (s !== 'recording') {
          // Decay bars to flat when not recording.
          levels = levels.map(() => 0);
          renderAll();
        }
      };

      renderAll();

      const tauri = window.__TAURI__;
      if (tauri) {
        tauri.event.listen('recording-state', (e) => setState(e.payload));
        tauri.event.listen('audio-level', (e) => pushLevel(Number(e.payload) || 0));
        stopBtn.addEventListener('click', () => tauri.core.invoke('toggle_recording').catch(console.error));
      }
    </script>
  </body>
</html>
